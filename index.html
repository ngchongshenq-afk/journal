function sbHeaders(){return{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'};}
function sbGet(id){return fetch(SB_URL+'/rest/v1/journal?id=eq.'+encodeURIComponent(id)+'&select=data',{headers:sbHeaders()}).then(function(r){return r.json();}).then(function(js){return js&&js.length?js[0].data:null;}).catch(function(){return null;});}
function sbSet(id,data){return fetch(SB_URL+'/rest/v1/journal',{method:'POST',headers:sbHeaders(),body:JSON.stringify({id:id,data:data,updated_at:new Date().toISOString()})}).catch(function(){});}
function sbGetAll(){return fetch(SB_URL+'/rest/v1/journal?select=id,data',{headers:sbHeaders()}).then(function(r){return r.json();}).catch(function(){return[];});}
function syncLbl(msg){var el=document.getElementById('slbl');if(el)el.textContent=msg;}
function gd(){
  var key=dk();
  if(CACHE[key])return Promise.resolve(CACHE[key]);
  syncLbl('Loading...');
  return sbGet(key).then(function(data){
    var d=data||{m:{},log:[],c:{},sum:''};
    CACHE[key]=d;syncLbl('');return d;
  });
}
function sd(d){
  var key=dk();CACHE[key]=d;
  try{localStorage.setItem('backup_'+key,JSON.stringify(d));}catch(e){}
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){syncLbl('Saving...');sbSet(key,d).then(function(){syncLbl('');});},800);
}
function manualSync(){
  var btn=document.getElementById('syncbtn');
  if(btn){btn.textContent='Syncing...';btn.disabled=true;}
  var keys=Object.keys(CACHE);
  var p=Promise.resolve();
  keys.forEach(function(k){p=p.then(function(){return sbSet(k,CACHE[k]);});});
  p.then(function(){
    if(btn){btn.textContent='Synced!';setTimeout(function(){btn.textContent='Sync';btn.disabled=false;},2000);}
  }).catch(function(){
    if(btn){btn.textContent='Failed';setTimeout(function(){btn.textContent='Sync';btn.disabled=false;},2000);}
  });
}
function toggleDark(){
  var isDark=document.body.classList.toggle('dark');
  localStorage.setItem('darkmode',isDark?'1':'0');
  document.getElementById('darkbtn').textContent=isDark?'☀️':'🌙';
}
function initDark(){
  var saved=localStorage.getItem('darkmode');
  var prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved==='1'||(saved===null&&prefersDark)){
    document.body.classList.add('dark');
    var btn=document.getElementById('darkbtn');if(btn)btn.textContent='☀️';
  }
}

function buildExport(days,fromDate,toDate){
  return sbGetAll().then(function(rows){
    var dataMap={};rows.forEach(function(r){dataMap[r.id]=r.data;});
    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dataMap[k])dataMap[k]=CACHE[k];});
    var tod=today();
    var keys=Object.keys(dataMap).filter(function(k){
      if(!k.startsWith('j-'))return false;
      var ds=k.replace('j-','');
      if(fromDate&&toDate)return ds>=fromDate&&ds<=toDate;
      if(days===1)return ds===tod;
      if(days>1){var cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);return new Date(ds+'T12:00:00')>=cutoff;}
      return true;
    }).sort();
    if(!keys.length)return null;
    var out='JOURNAL ENTRIES\n===============\n\n';
    keys.forEach(function(k){
      var v=dataMap[k];if(!v)return;
      var ds=k.replace('j-','');
      var lbl=new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      var has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c&&(v.c.c1||v.c.c2||v.c.c3));
      if(!has)return;
      out+='DATE: '+lbl+'\n';
      var ml=Object.values(v.m||{}).filter(Boolean);
      if(ml.length)out+='Morning: '+ml.join(' | ')+'\n';
      if(v.log&&v.log.length){out+='Log:\n';v.log.forEach(function(x){out+='  ['+x.tag+'] '+x.time+' -- '+x.text+(x.reply?' -> '+x.reply:'')+'\n';});}
      var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);
      if(cl.length)out+='Close: '+cl.join(' | ')+'\n';
      if(v.c&&v.c.star)out+='Awareness: '+v.c.star+'/5\n';
      if(v.c&&v.c.yn)out+='Aligned: '+({y:'Yes',p:'Partially',n:'Not really'}[v.c.yn]||'')+'\n';
      out+='\n';
    });
    return out;
  });
}
function doReview(days,btnId,extraPrompt,fromDate,toDate){
  var btn=document.getElementById(btnId);
  if(btn){btn.textContent='Preparing...';btn.disabled=true;}
  buildExport(days,fromDate,toDate).then(function(data){
    if(!data){if(btn){btn.textContent='No entries found';setTimeout(function(){btn.textContent='Copy & Open Claude';btn.disabled=false;},2500);}return;}
    var prompt=data+'\n===============\n'+extraPrompt;
    navigator.clipboard.writeText(prompt).then(function(){
      if(btn){btn.classList.add('copied');btn.textContent='Copied!';}
      setTimeout(function(){window.open(CLAUDE_URL,'_blank');},600);
      setTimeout(function(){if(btn){btn.classList.remove('copied');btn.textContent='Copy & Open Claude';btn.disabled=false;}},3000);
    }).catch(function(){if(btn){btn.textContent='Copy failed';btn.disabled=false;}});
  });
}

  var typeClass={today:'today',month:'month',alltime:'alltime'};
  if(!revs.length){list.innerHTML='<div class="empty-rev">No reviews saved yet.<br>Add a review in the + Add Review tab.</div>';return;}
  list.innerHTML='';
  revs.forEach(function(rev){
    var isExp=expandedRevs[rev.id];
    var card=document.createElement('div');card.className='rev-card';
    card.innerHTML='<div class="rev-card-header"><span class="rev-card-date">'+(rev.date||'No date')+'</span><span class="rev-card-type '+(typeClass[rev.type]||'')+'">'+(typeLabel[rev.type]||rev.type)+'</span></div><div class="'+(isExp?'rev-body':'rev-body-preview')+'" id="revbody-'+rev.id+'">'+rev.text+'</div><div class="rev-actions"><button class="rev-expand-btn" id="revexp-'+rev.id+'">'+(isExp?'Show less':'Read full')+'</button><button class="rev-copy-btn" id="revcopy-'+rev.id+'">Copy</button><button class="rev-delete-btn" id="revdel-'+rev.id+'">Delete</button></div>';
    list.appendChild(card);
    document.getElementById('revexp-'+rev.id).addEventListener('click',function(){expandedRevs[rev.id]=!expandedRevs[rev.id];renderSavedReviews();});
    document.getElementById('revcopy-'+rev.id).addEventListener('click',function(){navigator.clipboard.writeText(rev.text).then(function(){var b=document.getElementById('revcopy-'+rev.id);b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},2000);});});
    document.getElementById('revdel-'+rev.id).addEventListener('click',function(){if(!confirm('Delete this review?'))return;var updated=getRevs().filter(function(r){return r.id!==rev.id;});saveRevs(updated);renderSavedReviews();});
  });
}
function setFilter(tag,btn){activeFilter=tag;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderHistory();}
function pH(){
  document.getElementById('pane').innerHTML='<div class="hist-tabs"><button class="hist-tab on" id="ht-browse">Browse</button><button class="hist-tab" id="ht-tree">By Date</button></div><div id="browse-pane"><div class="search-wrap"><span class="search-icon">&#128269;</span><input class="search-input" id="kw-search" placeholder="Search entries..."></div><div class="filter-row"><button class="fb on" onclick="setFilter(\'all\',this)">All</button><button class="fb" onclick="setFilter(\'insight\',this)" style="background:#eff6ff;color:#1d4ed8;border-color:#dbeafe">Insight</button><button class="fb" onclick="setFilter(\'leadership\',this)" style="background:#f0fdf4;color:#15803d;border-color:#bbf7d0">Leadership</button><button class="fb" onclick="setFilter(\'energy\',this)" style="background:#fffbeb;color:#b45309;border-color:#fde68a">Energy</button><button class="fb" onclick="setFilter(\'decision\',this)" style="background:#fef2f2;color:#b91c1c;border-color:#fecaca">Decision</button><button class="fb" onclick="setFilter(\'relationship\',this)" style="background:#f5f3ff;color:#6d28d9;border-color:#ddd6fe">Relationship</button><button class="fb" onclick="setFilter(\'mindset\',this)" style="background:#fdf2f8;color:#9d174d;border-color:#fbcfe8">Mindset</button><button class="fb" onclick="setFilter(\'culture\',this)" style="background:#fefce8;color:#92400e;border-color:#fef08a">Culture</button></div><div id="hist-list"><div class="thinking">Loading...</div></div></div><div id="tree-pane" style="display:none"><div id="date-tree"></div></div>';
  document.getElementById('ht-browse').addEventListener('click',function(){switchHistTab('browse');});
  document.getElementById('ht-tree').addEventListener('click',function(){switchHistTab('tree');});
  document.getElementById('kw-search').addEventListener('input',function(){renderHistory();});
  renderHistory();
}
function switchHistTab(tab){
  document.getElementById('ht-browse').classList.toggle('on',tab==='browse');
  document.getElementById('ht-tree').classList.toggle('on',tab==='tree');
  document.getElementById('browse-pane').style.display=tab==='browse'?'':'none';
  document.getElementById('tree-pane').style.display=tab==='tree'?'':'none';
  if(tab==='tree')renderTree();
}
function renderHistory(){
  var list=document.getElementById('hist-list');if(!list)return;
  var tod=today();
  var kwEl=document.getElementById('kw-search');
  var kw=kwEl?kwEl.value.trim().toLowerCase():'';
  sbGetAll().then(function(rows){
    var dataMap={};rows.forEach(function(r){dataMap[r.id]=r.data;});
    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dataMap[k])dataMap[k]=CACHE[k];});
    var allKeys=Object.keys(dataMap).filter(function(k){return k.startsWith('j-');}).sort().reverse();
    if(!allKeys.length){list.innerHTML='<div class="empty">No entries yet</div>';return;}
    list.innerHTML='';var lastMonth='';var any=false;
    function hl(txt){if(!kw||!txt)return txt||'';return txt.replace(new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark class="search-highlight">$1</mark>');}
    allKeys.slice(0,120).forEach(function(k){
      try{
        var v=dataMap[k];if(!v)return;
        var ds=k.replace('j-','');var isT=ds===tod;
        var dateObj=new Date(ds+'T12:00:00');
        var lbl=dateObj.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
        var logEntries=v.log||[];
        if(activeFilter!=='all')logEntries=logEntries.filter(function(x){return x.tag===activeFilter;});
        if(kw){
          var ml2=Object.values(v.m||{}).filter(function(x){return x&&x.toLowerCase().indexOf(kw)>=0;});
          var cl2=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(function(x){return x&&x.toLowerCase().indexOf(kw)>=0;});
          logEntries=logEntries.filter(function(x){return(x.text+' '+(x.reply||'')).toLowerCase().indexOf(kw)>=0;});
          if(!logEntries.length&&!ml2.length&&!cl2.length)return;
        }
        var monthKey2=dateObj.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
        if(monthKey2!==lastMonth){var mh=document.createElement('div');mh.className='month-header';mh.textContent=monthKey2;list.appendChild(mh);lastMonth=monthKey2;}
        var inner='';
        if(activeFilter==='all'&&!kw){var ml=Object.values(v.m||{}).filter(Boolean);if(ml.length){inner+='<div class="hem">Morning</div>';ml.forEach(function(x){inner+='<div class="hbul">'+hl(x)+'</div>';});}}
        if(logEntries.length){inner+='<div class="hem">Log ('+logEntries.length+')</div>';logEntries.forEach(function(x){inner+='<div class="hli"><span class="hlt '+(TC[x.tag]||'ti')+'">'+(TL[x.tag]||x.tag)+'</span><span style="margin-left:5px">'+hl(x.text)+(x.reply?'<br><span style="font-size:12px;color:#aaa">-> '+hl(x.reply)+'</span>':'')+'</span></div>';});}
        if(activeFilter==='all'&&!kw){var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);if(cl.length){inner+='<div class="hem">Close</div>';cl.forEach(function(x){inner+='<div class="hbul">'+hl(x)+'</div>';});}}
        var meta=[];if(v.c&&v.c.star)meta.push('Awareness '+v.c.star+'/5');if(v.c&&v.c.yn)meta.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
        var card=document.createElement('div');card.className='hcard';
        card.innerHTML='<div class="hdr"><span class="hdl">'+lbl+'</span>'+(isT?'<span class="tdy">Today</span>':'')+' '+(meta.length?'<span class="hdm">'+meta.join(' - ')+'</span>':'')+'</div>'+inner;
        list.appendChild(card);any=true;
      }catch(e){}
    });
    if(!any)list.innerHTML='<div class="empty">No entries found</div>';
    renderTree(dataMap);
  });
}
function renderTree(dataMap){
  var tree=document.getElementById('date-tree');if(!tree)return;
  if(!dataMap){sbGetAll().then(function(rows){var dm={};rows.forEach(function(r){dm[r.id]=r.data;});Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dm[k])dm[k]=CACHE[k];});renderTree(dm);});return;}
  var tod=today();var keys=Object.keys(dataMap).filter(function(k){return k.startsWith('j-');}).sort().reverse();
  if(!keys.length){tree.innerHTML='<div class="empty">No entries yet</div>';return;}
  var grouped={};
  keys.forEach(function(k){
    var v=dataMap[k];if(!v)return;var ds=k.replace('j-','');
    var has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c&&(v.c.c1||v.c.c2||v.c.c3));
    if(!has)return;
    var d=new Date(ds+'T12:00:00');var yr=d.getFullYear();var mo=d.toLocaleDateString('en-GB',{month:'long'});
    if(!grouped[yr])grouped[yr]={};if(!grouped[yr][mo])grouped[yr][mo]=[];
    grouped[yr][mo].push({key:k,ds:ds,d:d,v:v});
  });
  tree.innerHTML='';
  Object.keys(grouped).sort().reverse().forEach(function(yr){
    var ydiv=document.createElement('div');ydiv.className='tree-year';
    var yid='yr-'+yr;
    ydiv.innerHTML='<button class="tree-year-btn" id="'+yid+'-btn">'+yr+' <span id="'+yid+'-arr">&#9660;</span></button><div id="'+yid+'" class="tree-months" style="display:none"></div>';
    tree.appendChild(ydiv);
    document.getElementById(yid+'-btn').addEventListener('click',function(){toggleTree(yid);});
    var mDiv=document.getElementById(yid);
    Object.keys(grouped[yr]).forEach(function(mo){
      var mid='mo-'+yr+'-'+mo.replace(/\s+/g,'');
      var entries=grouped[yr][mo];
      var mbtn=document.createElement('button');mbtn.className='tree-month-btn';
      mbtn.innerHTML=mo+' <span style="font-size:11px;color:#aaa">'+entries.length+' day'+(entries.length>1?'s':'')+'</span>';
      mbtn.addEventListener('click',function(){toggleTree(mid,mbtn);});
      var mdiv=document.createElement('div');mdiv.id=mid;mdiv.className='tree-days';mdiv.style.display='none';
      entries.forEach(function(entry){
        var key=entry.key;var ds=entry.ds;var d=entry.d;var v=entry.v;
        var isT=ds===tod;
        var dayLbl=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        var logCount=v.log?v.log.length:0;
        var dbtn=document.createElement('button');dbtn.className='tree-day-btn'+(isT?' today-day':'');
        dbtn.innerHTML='<span>'+dayLbl+(isT?' - Today':'')+'</span><span style="font-size:11px;color:#aaa">'+logCount+' log'+(logCount!==1?'s':'')+'</span>';
        var did='day-'+key;
        dbtn.addEventListener('click',function(){
          var existing=document.getElementById(did);if(existing){existing.remove();return;}
          var dd=document.createElement('div');dd.id=did;dd.className='day-detail';
          var inner='';
          var ml=Object.values(v.m||{}).filter(Boolean);if(ml.length){inner+='<div class="hem">Morning</div>';ml.forEach(function(x){inner+='<div class="hbul">'+x+'</div>';});}
          if(v.log&&v.log.length){inner+='<div class="hem">Log</div>';v.log.forEach(function(x){inner+='<div class="hli"><span class="hlt '+(TC[x.tag]||'ti')+'">'+(TL[x.tag]||x.tag)+'</span><span style="margin-left:5px">'+x.text+(x.reply?'<br><span style="font-size:12px;color:#aaa">-> '+x.reply+'</span>':'')+'</span></div>';});}
          var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);if(cl.length){inner+='<div class="hem">Close</div>';cl.forEach(function(x){inner+='<div class="hbul">'+x+'</div>';});}
          var meta=[];if(v.c&&v.c.star)meta.push('Awareness '+v.c.star+'/5');if(v.c&&v.c.yn)meta.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
          if(meta.length)inner+='<div style="font-size:12px;color:#aaa;margin-top:6px">'+meta.join(' - ')+'</div>';
          if(!inner)inner='<div class="empty" style="padding:10px 0">No content</div>';
          dd.innerHTML=inner;dbtn.parentNode.insertBefore(dd,dbtn.nextSibling);
        });
        mdiv.appendChild(dbtn);
      });
      mDiv.appendChild(mbtn);mDiv.appendChild(mdiv);
    });
  });
}
function toggleTree(id,btn){
  var el=document.getElementById(id);if(!el)return;
  var open=el.style.display==='none';el.style.display=open?'':'none';
  if(btn)btn.classList.toggle('open',open);
  var arr=document.getElementById(id+'-arr');if(arr)arr.innerHTML=open?'&#9650;':'&#9660;';
}
function doStreak(){
  sbGetAll().then(function(rows){
    var ks={};rows.filter(function(r){return r.id.startsWith('j-');}).forEach(function(r){ks[r.id.replace('j-','')]=1;});
    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){ks[k.replace('j-','')]=1;});
    var n=0;var d=new Date();
    for(var i=0;i<60;i++){
      var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      if(ks[ds]){n++;d.setDate(d.getDate()-1);}else if(i===0)d.setDate(d.getDate()-1);else break;
    }
    var el=document.getElementById('slbl');if(el)el.textContent=n>1?n+' day streak':'';
  });
}
function restoreFromBackup(){
  return sbGetAll().then(function(rows){
    var existingIds={};rows.forEach(function(r){existingIds[r.id]=1;});
    var promises=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith('backup_')){
        var id=k.replace('backup_','');
        if(!existingIds[id]){
          try{var d=JSON.parse(localStorage.getItem(k));promises.push(sbSet(id,d));}catch(e){}
        }
      }
    }
    return Promise.all(promises);
  });
}
document.getElementById('dlbl').textContent=dtStr();
initDark();
restoreFromBackup().then(function(){doStreak();show('m');});
</script>
