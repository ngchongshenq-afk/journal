<script>
const SB_URL='https://bgdocmemcjmmtrivqmju.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnZG9jbWVtY2ptbXRyaXZxbWp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTUxNjIsImV4cCI6MjA5NTI5MTE2Mn0.e999riyEm3ht9GRycU6ObuVXLfePAtcKyRFsx_Q2GpQ';
const CLAUDE_URL='https://claude.ai/new';

const TL={insight:'Insight',leadership:'Leadership',energy:'Energy',decision:'Decision',relationship:'Relationship',mindset:'Mindset',culture:'Culture'};
const TC={insight:'ti',leadership:'tl',energy:'te',decision:'td',relationship:'tr',mindset:'tm',culture:'tc'};
const TP={
  insight:['What does this tell you about yourself?','What belief is being challenged?','What would you do differently?'],
  leadership:['How did you show up — was it intentional?','Who was affected and how?','What did you model for others?'],
  energy:['What triggered this shift?','How did it affect your focus?','What would restore this?'],
  decision:['What drove that choice?','What did you trade off?','How will you know if it was right?'],
  relationship:['What did this bring up for you?','How did you handle it?','What does this say about what you value?'],
  mindset:['What story are you telling yourself?','Is this belief serving you?','What would a growth mindset look like?'],
  culture:['How did this differ from what you expected?','How did you adapt?','What are you still figuring out?']
};
const KW={
  relationship:['friend','family','partner','colleague','disappoint','two-tim','cheat','loyal','hurt','let down','argument','care about','close to'],
  leadership:['cadet','officer','train','course','lead','team','command','instruct','mentor','influence','brief','platoon','conduct','showed up','spoke up','stepped up'],
  culture:['workplace','culture','posted','new posting','way things work','fitting in','still learning','adjustment','not used to','finding my feet'],
  energy:['tired','exhaust','drain','energis','motivat','stress','anxious','calm','restless','burnt out','switched off','recharg','fun','enjoying','playing','game','relax','wound up','pumped','vib'],
  decision:['decided','choosing','choice','option','weighing','going with','picked','committed','should i','do i','considering','trade off'],
  mindset:['believe','telling myself','self-doubt','confidence','pattern','realised about','always do this','comparing','imposter','not good enough']
};

function autoTag(t){
  const s=t.toLowerCase();let best='insight',score=0;
  for(const[k,ws]of Object.entries(KW)){const n=ws.filter(w=>s.includes(w)).length;if(n>score){score=n;best=k;}}
  if(score===0){if(/feel|felt|feeling/.test(s))return'energy';if(/realise|realize|noticed|learning/.test(s))return'insight';}
  return best;
}

let sv=0,yv='',eid=null,activeFilter='all',revType='today';
let CACHE={};
let saveTimer=null;
let expandedRevs=new Set();

function dk(){const d=new Date();return'j-'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dtStr(){return new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function nowT(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}

function sbHeaders(){return{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'};}

async function sbGet(id){
  try{
    const r=await fetch(SB_URL+'/rest/v1/journal?id=eq.'+encodeURIComponent(id)+'&select=data',{headers:sbHeaders()});
    const js=await r.json();
    return js&&js.length?js[0].data:null;
  }catch(e){return null;}
}

async function sbSet(id,data){
  try{
    await fetch(SB_URL+'/rest/v1/journal',{
      method:'POST',
      headers:{...sbHeaders(),'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id,data,updated_at:new Date().toISOString()})
    });
  }catch(e){console.warn('sync failed',e);}
}

async function sbGetAll(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/journal?select=id,data',{headers:sbHeaders()});
    return await r.json();
  }catch(e){return[];}
}

function syncLbl(msg){const el=document.getElementById('slbl');if(el)el.textContent=msg;}

async function gd(){
  const key=dk();
  if(CACHE[key])return CACHE[key];
  syncLbl('Loading...');
  const data=await sbGet(key);
  const d=data||{m:{},log:[],c:{},sum:''};
  CACHE[key]=d;
  syncLbl('');
  return d;
}

async function sd(d){
  const key=dk();
  CACHE[key]=d;
  // save to localStorage immediately as backup
  try{localStorage.setItem('backup_'+key,JSON.stringify(d));}catch(e){}
  // debounce push to Supabase
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    syncLbl('Saving...');
    await sbSet(key,d);
    syncLbl('');
  },800);
}

async function manualSync(){
  const btn=document.getElementById('syncbtn');
  if(btn){btn.textContent='Syncing...';btn.disabled=true;}
  try{
    // Push all cached data
    for(const[key,data]of Object.entries(CACHE)){
      await sbSet(key,data);
    }
    // Also push any localStorage backups
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('backup_j-')){
        const id=k.replace('backup_','');
        if(!CACHE[id]){
          try{const d=JSON.parse(localStorage.getItem(k));await sbSet(id,d);}catch(e){}
        }
      }
    }
    if(btn){btn.textContent='Synced ✓';setTimeout(()=>{btn.textContent='Sync';btn.disabled=false;},2000);}
  }catch(e){
    if(btn){btn.textContent='Failed';setTimeout(()=>{btn.textContent='Sync';btn.disabled=false;},2000);}
  }
}

function fl(id){const e=document.getElementById(id);if(!e)return;e.textContent='Saved ✓';e.style.opacity='1';setTimeout(()=>e.style.opacity='0',2000);}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}
function autoResize(ta){if(!ta)return;ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function bindAllTA(){document.querySelectorAll('textarea').forEach(ta=>{autoResize(ta);ta.addEventListener('input',()=>autoResize(ta));});}

function show(t){
  document.querySelectorAll('.tb').forEach((b,i)=>{b.classList.toggle('on',['m','l','c','r','v','h'][i]===t);});
  window.scrollTo(0,0);
  if(t==='m')pM();else if(t==='l')pL();else if(t==='c')pC();else if(t==='r')pR();else if(t==='v')pV();else pH();

async function buildExport(days){
  const tod=today();
  const rows=await sbGetAll();
  let keys=rows.map(r=>r.id).filter(k=>k.startsWith('j-')).sort().reverse();
  if(days===1){keys=keys.filter(k=>k.replace('j-','')===tod);}
  else if(days>1){
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
    keys=keys.filter(k=>new Date(k.replace('j-','')+'T12:00:00')>=cutoff);
  }
  if(!keys.length)return null;
  let out='JOURNAL ENTRIES\n===============\n\n';
  const dataMap={};rows.forEach(r=>{dataMap[r.id]=r.data;});
  [...keys].reverse().forEach(k=>{
    const v=dataMap[k];if(!v)return;
    const ds=k.replace('j-','');
    const lbl=new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c?.c1||v.c?.c2||v.c?.c3);
    if(!has)return;
    out+=`DATE: ${lbl}\n`;
    const ml=Object.values(v.m||{}).filter(Boolean);
    if(ml.length)out+='Morning: '+ml.join(' | ')+'\n';
    if(v.log&&v.log.length){out+='Log:\n';v.log.forEach(x=>{out+=`  [${x.tag}] ${x.time} — ${x.text}${x.reply?' → '+x.reply:''}\n`;});}
    const cl=[v.c?.c1,v.c?.c2,v.c?.c3].filter(Boolean);
    if(cl.length)out+='Close: '+cl.join(' | ')+'\n';
    if(v.c?.star)out+='Awareness: '+v.c.star+'/5\n';
    if(v.c?.yn)out+='Aligned: '+({y:'Yes',p:'Partially',n:'Not really'}[v.c.yn]||'')+'\n';
    out+='\n';
  });
  return out;
}

async function renderHistory(){
  const list=document.getElementById('hist-list');if(!list)return;
  const tod=today();
  const kwEl=document.getElementById('kw-search');
  const kw=(kwEl?kwEl.value.trim():'').toLowerCase();
  const rows=await sbGetAll();
  const keys=rows.filter(r=>r.id.startsWith('j-')).map(r=>r.id).sort().reverse();
  const dataMap={};rows.forEach(r=>{dataMap[r.id]=r.data;});
  // Also check cache
  Object.keys(CACHE).filter(k=>k.startsWith('j-')).forEach(k=>{if(!dataMap[k])dataMap[k]=CACHE[k];});
  if(!keys.length&&!Object.keys(dataMap).filter(k=>k.startsWith('j-')).length){list.innerHTML='<div class="empty">No entries yet</div>';return;}
  const allKeys=[...new Set([...keys,...Object.keys(dataMap).filter(k=>k.startsWith('j-'))])].sort().reverse();
  list.innerHTML='';
  let lastMonth='';let any=false;
  function hl(txt){if(!kw||!txt)return txt||'';const re=new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return txt.replace(re,'<mark class="search-highlight">$1</mark>');}
  allKeys.slice(0,120).forEach(k=>{
    try{
      const v=dataMap[k];if(!v)return;
      const ds=k.replace('j-','');const isT=ds===tod;
      const dateObj=new Date(ds+'T12:00:00');
      const lbl=dateObj.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
      let logEntries=v.log||[];
      if(activeFilter!=='all')logEntries=logEntries.filter(x=>x.tag===activeFilter);
      if(kw){
        const ml=Object.values(v.m||{}).filter(x=>x&&x.toLowerCase().includes(kw));
        const cl=[v.c?.c1,v.c?.c2,v.c?.c3].filter(x=>x&&x.toLowerCase().includes(kw));
        logEntries=logEntries.filter(x=>(x.text+' '+(x.reply||'')).toLowerCase().includes(kw));
        if(!logEntries.length&&!ml.length&&!cl.length)return;
      }
      const monthKey=dateObj.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
      if(monthKey!==lastMonth){const mh=document.createElement('div');mh.className='month-header';mh.textContent=monthKey;list.appendChild(mh);lastMonth=monthKey;}
      let inner='';
      if(activeFilter==='all'&&!kw){const ml=Object.values(v.m||{}).filter(Boolean);if(ml.length){inner+=`<div class="hem">Morning</div>`;ml.forEach(x=>{inner+=`<div class="hbul">${hl(x)}</div>`;});}}
      if(logEntries.length){inner+=`<div class="hem">Log (${logEntries.length})</div>`;logEntries.forEach(x=>{inner+=`<div class="hli"><span class="hlt ${TC[x.tag]||'ti'}">${TL[x.tag]||x.tag}</span><span style="margin-left:5px">${hl(x.text)}${x.reply?'<br><span style="font-size:12px;color:#aaa">↳ '+hl(x.reply)+'</span>':''}</span></div>`;});}
      if(activeFilter==='all'&&!kw){const cl=[v.c?.c1,v.c?.c2,v.c?.c3].filter(Boolean);if(cl.length){inner+=`<div class="hem">Close</div>`;cl.forEach(x=>{inner+=`<div class="hbul">${hl(x)}</div>`;});}}
      const meta=[];if(v.c?.star)meta.push('Awareness '+v.c.star+'/5');if(v.c?.yn)meta.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
      const card=document.createElement('div');card.className='hcard';
      card.innerHTML=`<div class="hdr"><span class="hdl">${lbl}</span>${isT?'<span class="tdy">Today</span>':''} ${meta.length?'<span class="hdm">'+meta.join(' · ')+'</span>':''}</div>${inner}`;
      list.appendChild(card);any=true;
    }catch(e){}
  });
  if(!any)list.innerHTML='<div class="empty">No entries found</div>';
  // Also render tree with same data
  renderTree(dataMap);
}

function switchHistTab(tab){
  document.getElementById('ht-browse').classList.toggle('on',tab==='browse');
  document.getElementById('ht-tree').classList.toggle('on',tab==='tree');
  document.getElementById('browse-pane').style.display=tab==='browse'?'':'none';
  document.getElementById('tree-pane').style.display=tab==='tree'?'':'none';
}

function renderTree(dataMap){
  const tree=document.getElementById('date-tree');if(!tree)return;
  const tod=today();
  const keys=Object.keys(dataMap).filter(k=>k.startsWith('j-')).sort().reverse();
  if(!keys.length){tree.innerHTML='<div class="empty">No entries yet</div>';return;}
  const grouped={};
  keys.forEach(k=>{
    const v=dataMap[k];if(!v)return;
    const ds=k.replace('j-','');
    const has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c?.c1||v.c?.c2||v.c?.c3);
    if(!has)return;
    const d=new Date(ds+'T12:00:00');
    const yr=d.getFullYear();const mo=d.toLocaleDateString('en-GB',{month:'long'});
    if(!grouped[yr])grouped[yr]={};
    if(!grouped[yr][mo])grouped[yr][mo]=[];
    grouped[yr][mo].push({key:k,ds,d,v});
  });
  tree.innerHTML='';
  Object.keys(grouped).sort().reverse().forEach(yr=>{
    const ydiv=document.createElement('div');ydiv.className='tree-year';
    const yid='yr-'+yr;
    ydiv.innerHTML=`<button class="tree-year-btn" onclick="toggleTree('${yid}',this)">${yr} <span id="${yid}-arr">▼</span></button><div id="${yid}" class="tree-months" style="display:none"></div>`;
    tree.appendChild(ydiv);
    const mDiv=document.getElementById(yid);
    Object.keys(grouped[yr]).forEach(mo=>{
      const mid='mo-'+yr+'-'+mo.replace(/\s+/g,'');
      const entries=grouped[yr][mo];
      const mbtn=document.createElement('button');mbtn.className='tree-month-btn';
      mbtn.innerHTML=`${mo} <span style="font-size:11px;color:#aaa">${entries.length} day${entries.length>1?'s':''}</span>`;
      mbtn.onclick=function(){toggleTree(mid,this);};
      const mdiv=document.createElement('div');mdiv.id=mid;mdiv.className='tree-days';mdiv.style.display='none';
      entries.forEach(({key,ds,d,v})=>{
        const isT=ds===tod;
        const dayLbl=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        const logCount=v.log?v.log.length:0;
        const dbtn=document.createElement('button');dbtn.className='tree-day-btn'+(isT?' today-day':'');
        dbtn.innerHTML=`<span>${dayLbl}${isT?' · Today':''}</span><span style="font-size:11px;color:#aaa">${logCount} log${logCount!==1?'s':''}</span>`;
        const did='day-'+key;
        dbtn.onclick=function(){
          const existing=document.getElementById(did);if(existing){existing.remove();return;}
          const dd=document.createElement('div');dd.id=did;dd.className='day-detail';
          let inner='';
          const ml=Object.values(v.m||{}).filter(Boolean);
          if(ml.length){inner+=`<div class="hem">Morning</div>`;ml.forEach(x=>{inner+=`<div class="hbul">${x}</div>`;});}
          if(v.log&&v.log.length){inner+=`<div class="hem">Log</div>`;v.log.forEach(x=>{inner+=`<div class="hli"><span class="hlt ${TC[x.tag]||'ti'}">${TL[x.tag]||x.tag}</span><span style="margin-left:5px">${x.text}${x.reply?'<br><span style="font-size:12px;color:#aaa">↳ '+x.reply+'</span>':''}</span></div>`;});}
          const cl=[v.c?.c1,v.c?.c2,v.c?.c3].filter(Boolean);
          if(cl.length){inner+=`<div class="hem">Close</div>`;cl.forEach(x=>{inner+=`<div class="hbul">${x}</div>`;});}
          const meta=[];if(v.c?.star)meta.push('Awareness '+v.c.star+'/5');if(v.c?.yn)meta.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
          if(meta.length)inner+=`<div style="font-size:12px;color:#aaa;margin-top:6px">${meta.join(' · ')}</div>`;
          if(!inner)inner='<div class="empty" style="padding:10px 0">No content</div>';
          dd.innerHTML=inner;dbtn.parentNode.insertBefore(dd,dbtn.nextSibling);
        };
        mdiv.appendChild(dbtn);
      });
      mDiv.appendChild(mbtn);mDiv.appendChild(mdiv);
    });
  });
}

function toggleTree(id,btn){
  const el=document.getElementById(id);if(!el)return;
  const open=el.style.display==='none';el.style.display=open?'':'none';
  if(btn)btn.classList.toggle('open',open);
  const arr=document.getElementById(id+'-arr');if(arr)arr.textContent=open?'▲':'▼';
}

async function doStreak(){
  const rows=await sbGetAll();
  const ks=new Set(rows.filter(r=>r.id.startsWith('j-')).map(r=>r.id.replace('j-','')));
  Object.keys(CACHE).filter(k=>k.startsWith('j-')).forEach(k=>ks.add(k.replace('j-','')));
  let n=0;const d=new Date();
  for(let i=0;i<60;i++){
    if(ks.has(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'))){n++;d.setDate(d.getDate()-1);}
    else if(i===0)d.setDate(d.getDate()-1);else break;
  }
  const el=document.getElementById('slbl');if(el)el.textContent=n>1?n+' day streak':'';
}

// Restore existing data on first load
async function restoreFromBackup(){
  // Check localStorage for any backed up entries and push to supabase if not there
  const existing=await sbGetAll();
  const existingIds=new Set(existing.map(r=>r.id));
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('backup_')){
      const id=k.replace('backup_','');
      if(!existingIds.has(id)){
        try{const d=JSON.parse(localStorage.getItem(k));await sbSet(id,d);existingIds.add(id);}catch(e){}
      }
    }
  }
}

document.getElementById('dlbl').textContent=dtStr();
restoreFromBackup().then(()=>{doStreak();show('m');});
</script>
