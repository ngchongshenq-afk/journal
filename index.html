<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{

  --bg:#09090b;

  --surface:#111114;

  --surface2:#18181c;

  --surface3:#1e1e24;

  --border:rgba(255,255,255,0.07);

  --border2:rgba(255,255,255,0.12);

  --text:#f4f4f5;

  --text2:#a1a1aa;

  --text3:#52525b;

  --accent:#e8d5b0;

  --accent2:rgba(232,213,176,0.12);

  --accent3:rgba(232,213,176,0.06);

  --green:#4ade80;

  --red:#f87171;

  --blue:#60a5fa;

  --purple:#a78bfa;

  --orange:#fb923c;

  --yellow:#fbbf24;

  --pink:#f472b6;

  --teal:#2dd4bf;

  --serif:'DM Serif Display',serif;

  --sans:'DM Sans',sans-serif;

}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;padding-bottom:env(safe-area-inset-bottom)}


/* Scrollbar */

::-webkit-scrollbar{width:2px}

::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}


/* Topbar */

#topbar{

  background:var(--bg);

  border-bottom:1px solid var(--border);

  padding:14px 20px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:sticky;top:0;z-index:10;

  backdrop-filter:blur(12px);

}

#dlbl{

  font-family:var(--serif);

  font-size:18px;

  color:var(--accent);

  letter-spacing:-0.3px;

}

#topright{display:flex;align-items:center;gap:10px}

#slbl{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;letter-spacing:0.5px}

#darkbtn,#syncbtn{

  font-size:12px;

  padding:5px 12px;

  border-radius:6px;

  border:1px solid var(--border2);

  background:var(--surface2);

  color:var(--text2);

  cursor:pointer;

  font-family:var(--sans);

  letter-spacing:0.3px;

  transition:all 0.15s;

}

#darkbtn,#lockbtn{width:32px;padding:0;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px}

#lockbtn{border-radius:6px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;transition:all 0.15s}

#lockbtn:hover{background:var(--surface3);border-color:var(--border2)}

#darkbtn:hover,#syncbtn:hover{border-color:var(--border2);color:var(--text);background:var(--surface3)}


/* Tabs */

#tabs{

  background:var(--bg);

  border-bottom:1px solid var(--border);

  padding:0 20px;

  display:flex;

  gap:0;

  overflow-x:auto;

  position:sticky;top:57px;z-index:9;

}

#tabs::-webkit-scrollbar{display:none}

.tb{

  flex-shrink:0;

  font-size:12px;

  font-weight:500;

  padding:12px 16px;

  background:transparent;

  color:var(--text3);

  cursor:pointer;

  font-family:var(--sans);

  white-space:nowrap;

  border:none;

  border-bottom:2px solid transparent;

  letter-spacing:0.8px;

  text-transform:uppercase;

  transition:all 0.15s;

}

.tb:hover{color:var(--text2)}

.tb.on{color:var(--accent);border-bottom-color:var(--accent)}


/* Pane */

#pane{padding:24px 20px 40px;max-width:680px;margin:0 auto}


/* Cards */

.card{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:12px;

  padding:20px;

  margin-bottom:14px;

}

.lbl{

  font-size:10px;

  font-weight:600;

  color:var(--text3);

  text-transform:uppercase;

  letter-spacing:1.2px;

  margin-bottom:16px;

}

.row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}

.rl{

  font-size:13px;

  color:var(--text2);

  padding-top:10px;

  flex:1.2;

  min-width:0;

  line-height:1.4;

}

textarea{

  flex:2;

  font-size:14px;

  border:1px solid var(--border);

  border-radius:8px;

  padding:9px 12px;

  background:var(--surface2);

  color:var(--text);

  resize:none;

  min-height:38px;

  font-family:var(--sans);

  line-height:1.5;

  overflow:hidden;

  width:100%;

  transition:border-color 0.15s;

}

textarea:focus{outline:none;border-color:var(--border2);background:var(--surface3)}

textarea::placeholder{color:var(--text3)}


.btn{

  width:100%;

  padding:13px;

  border-radius:8px;

  background:var(--accent);

  color:var(--bg);

  border:none;

  font-size:14px;

  font-weight:600;

  cursor:pointer;

  margin-top:6px;

  font-family:var(--sans);

  letter-spacing:0.3px;

  transition:opacity 0.15s;

}

.btn:hover{opacity:0.9}

.btn:disabled{opacity:.35;cursor:not-allowed}

.ok{text-align:center;font-size:12px;color:var(--green);height:20px;margin-top:6px;transition:opacity .3s;letter-spacing:0.3px}


/* Log input */

.sinput{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:12px;

  padding:16px;

  margin-bottom:14px;

}

.srow{display:flex;gap:10px;align-items:flex-end}

.sta{

  flex:1;

  font-size:14px;

  border:1px solid var(--border);

  border-radius:8px;

  padding:10px 14px;

  background:var(--surface2);

  color:var(--text);

  resize:none;

  min-height:44px;

  font-family:var(--sans);

  line-height:1.5;

  overflow:hidden;

  transition:border-color 0.15s;

}

.sta:focus{outline:none;border-color:var(--border2);background:var(--surface3)}

.sta::placeholder{color:var(--text3)}

.sbtn{

  width:44px;height:44px;flex-shrink:0;

  border-radius:8px;

  background:var(--accent);

  color:var(--bg);

  border:none;

  font-size:18px;

  cursor:pointer;

  display:flex;align-items:center;justify-content:center;

  transition:opacity 0.15s;

}

.sbtn:hover{opacity:0.9}

.stxt{font-size:12px;color:var(--green);margin-top:8px;min-height:16px;letter-spacing:0.3px}


/* Divider */

.divlbl{

  font-size:10px;color:var(--text3);text-align:center;

  margin:4px 0 14px;

  display:flex;align-items:center;gap:10px;

  text-transform:uppercase;letter-spacing:1px;

}

.divlbl::before,.divlbl::after{content:'';flex:1;height:1px;background:var(--border)}


/* Log items */

.li{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:12px;

  padding:14px 16px;

  margin-bottom:10px;

  transition:border-color 0.15s;

}

.li:hover{border-color:var(--border2)}

.ltop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}

.ltime{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:7px;font-variant-numeric:tabular-nums}

.ltxt{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:10px}

.chips{border-top:1px solid var(--border);padding-top:10px;display:flex;flex-wrap:wrap;gap:6px}

.chip{

  font-size:11px;

  color:var(--accent);

  background:var(--accent3);

  border:1px solid rgba(232,213,176,0.15);

  border-radius:5px;

  padding:4px 10px;

  cursor:pointer;

  font-family:var(--sans);

  letter-spacing:0.2px;

  transition:all 0.15s;

}

.chip:hover{background:var(--accent2);border-color:rgba(232,213,176,0.3)}

.rta{

  width:100%;font-size:13px;

  border:1px solid var(--border);

  border-radius:8px;

  padding:8px 12px;

  background:var(--surface2);

  color:var(--text);

  resize:none;min-height:34px;

  font-family:var(--sans);

  margin-top:10px;overflow:hidden;

  transition:border-color 0.15s;

}

.rta:focus{outline:none;border-color:var(--border2)}

.rta::placeholder{color:var(--text3)}

.rsave{

  margin-top:6px;font-size:11px;

  padding:5px 12px;border-radius:6px;

  border:1px solid var(--border2);

  background:transparent;color:var(--text2);

  cursor:pointer;font-family:var(--sans);

  letter-spacing:0.3px;

  transition:all 0.15s;

}

.rsave:hover{color:var(--text);border-color:var(--border2)}

.abtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px;line-height:1;transition:color 0.15s}

.abtn:hover{color:var(--text2)}


/* Tags */

.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

.ti{background:rgba(96,165,250,0.12);color:var(--blue)}

.tl{background:rgba(74,222,128,0.12);color:var(--green)}

.te{background:rgba(251,191,36,0.12);color:var(--yellow)}

.td{background:rgba(248,113,113,0.12);color:var(--red)}

.tr{background:rgba(167,139,250,0.12);color:var(--purple)}

.tm{background:rgba(244,114,182,0.12);color:var(--pink)}

.tc{background:rgba(45,212,191,0.12);color:var(--teal)}


/* Edit mode */

.etrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

.etag{font-size:10px;padding:4px 10px;border-radius:4px;font-weight:600;cursor:pointer;border:none;opacity:.35;font-family:var(--sans);letter-spacing:0.5px;text-transform:uppercase;transition:opacity 0.15s}

.etag.on{opacity:1}

.eta{width:100%;font-size:14px;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;background:var(--surface2);color:var(--text);resize:none;min-height:54px;font-family:var(--sans);line-height:1.5;margin-bottom:8px;overflow:hidden}

.eta:focus{outline:none}

.erow{display:flex;gap:8px;margin-bottom:8px}

.esave{flex:1;padding:8px;border-radius:7px;background:var(--accent);color:var(--bg);border:none;font-size:12px;cursor:pointer;font-weight:600;font-family:var(--sans);letter-spacing:0.3px;transition:opacity 0.15s}

.esave:hover{opacity:0.9}

.ecancel{padding:8px 14px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all 0.15s}

.ecancel:hover{color:var(--text)}


/* Stars */

.stars{display:flex;gap:6px;margin-top:8px}

.star{

  width:38px;height:38px;border-radius:8px;

  border:1px solid var(--border);

  background:var(--surface2);

  color:var(--text3);font-size:13px;

  cursor:pointer;display:flex;align-items:center;justify-content:center;

  font-family:var(--sans);font-weight:600;

  transition:all 0.15s;

}

.star:hover{border-color:var(--border2);color:var(--text2)}

.star.on{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:var(--yellow)}


/* YN */

.yn{display:flex;gap:8px;margin-top:10px}

.ynb{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all 0.15s}

.ynb:hover{border-color:var(--border2);color:var(--text)}

.ynb.sy{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:var(--green)}

.ynb.sp{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.25);color:var(--yellow)}

.ynb.sn{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.25);color:var(--red)}


/* Review tab */

.review-option{

  background:var(--surface);

  border:1px solid var(--border);

  border-radius:12px;

  padding:20px;

  margin-bottom:12px;

  transition:border-color 0.15s;

}

.review-option:hover{border-color:var(--border2)}

.review-title{font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px}

.review-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}

.review-btn{

  width:100%;padding:12px;border-radius:8px;

  background:transparent;

  border:1px solid var(--border2);

  color:var(--accent);

  font-size:13px;font-weight:600;

  cursor:pointer;font-family:var(--sans);

  letter-spacing:0.5px;text-transform:uppercase;

  transition:all 0.15s;

}

.review-btn:hover{background:var(--accent2);border-color:rgba(232,213,176,0.3)}

.review-btn.copied{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3);color:var(--green)}


/* Month banner */

.month-banner{

  background:rgba(251,191,36,0.06);

  border:1px solid rgba(251,191,36,0.2);

  border-radius:12px;

  padding:16px 18px;

  margin-bottom:16px;

  display:flex;justify-content:space-between;align-items:center;gap:12px;

}

.month-banner-text{font-size:13px;color:var(--yellow);line-height:1.5;flex:1}

.month-banner-title{font-family:var(--serif);font-weight:normal;font-size:16px;color:var(--yellow);margin-bottom:2px}

.month-banner-btns{display:flex;gap:6px;flex-direction:column}

.banner-review-btn{font-size:11px;padding:7px 14px;border-radius:6px;background:var(--yellow);color:var(--bg);border:none;cursor:pointer;font-family:var(--sans);font-weight:700;letter-spacing:0.3px;white-space:nowrap;transition:opacity 0.15s}

.banner-review-btn:hover{opacity:0.85}

.banner-dismiss-btn{font-size:11px;padding:7px 14px;border-radius:6px;background:transparent;color:var(--yellow);border:1px solid rgba(251,191,36,0.25);cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all 0.15s}

.banner-dismiss-btn:hover{background:rgba(251,191,36,0.08)}


/* Reviews tab */

.rev-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden}

.rev-tab{flex:1;padding:10px;font-size:12px;font-family:var(--sans);border:none;background:transparent;color:var(--text3);cursor:pointer;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s}

.rev-tab.on{background:var(--surface2);color:var(--accent)}

.rev-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;transition:border-color 0.15s}

.rev-card:hover{border-color:var(--border2)}

.rev-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

.rev-card-date{font-family:var(--serif);font-size:16px;color:var(--text);letter-spacing:-0.2px}

.rev-card-type{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase}

.rev-card-type.today,.rev-card-type.specific{background:rgba(96,165,250,0.1);color:var(--blue)}

.rev-card-type.month{background:rgba(74,222,128,0.1);color:var(--green)}

.rev-card-type.alltime{background:rgba(167,139,250,0.1);color:var(--purple)}

.rev-body{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-word}

.rev-body-preview{font-size:13px;color:var(--text2);line-height:1.8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.rev-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);align-items:center}

.rev-expand-btn,.rev-copy-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);letter-spacing:0.3px;transition:all 0.15s}

.rev-expand-btn:hover,.rev-copy-btn:hover{color:var(--text);border-color:var(--border2)}

.rev-delete-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid rgba(248,113,113,0.2);background:transparent;color:var(--red);cursor:pointer;font-family:var(--sans);letter-spacing:0.3px;margin-left:auto;transition:all 0.15s}

.rev-delete-btn:hover{background:rgba(248,113,113,0.08)}

.paste-area{width:100%;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface2);color:var(--text);resize:none;min-height:140px;font-family:var(--sans);line-height:1.6;overflow:hidden;margin-bottom:10px;transition:border-color 0.15s}

.paste-area:focus{outline:none;border-color:var(--border2);background:var(--surface3)}

.paste-area::placeholder{color:var(--text3)}

.rev-type-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

.rtb{flex:1;min-width:70px;padding:8px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--sans);font-weight:600;text-align:center;letter-spacing:0.4px;text-transform:uppercase;transition:all 0.15s}

.rtb.on{background:var(--surface2);color:var(--accent);border-color:var(--border2)}

.date-input{width:100%;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:9px 12px;background:var(--surface2);color:var(--text);font-family:var(--sans);outline:none;margin-bottom:12px;transition:border-color 0.15s}

.date-input:focus{border-color:var(--border2);background:var(--surface3)}


/* History */

.search-wrap{margin-bottom:12px;position:relative}

.search-input{width:100%;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:10px 14px 10px 38px;background:var(--surface2);color:var(--text);font-family:var(--sans);outline:none;transition:border-color 0.15s}

.search-input:focus{border-color:var(--border2);background:var(--surface3)}

.search-input::placeholder{color:var(--text3)}

.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

.hist-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}

.hist-tab{flex:1;padding:10px;font-size:12px;font-family:var(--sans);border:none;background:transparent;color:var(--text3);cursor:pointer;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s}

.hist-tab.on{background:var(--surface2);color:var(--accent)}

.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}

.fb{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--sans);white-space:nowrap;letter-spacing:0.3px;transition:all 0.15s}

.fb:hover{color:var(--text2);border-color:var(--border2)}

.fb.on{background:var(--surface2);color:var(--accent);border-color:var(--border2)}

.month-header{

  font-family:var(--serif);

  font-size:22px;

  color:var(--text);

  margin:24px 0 12px;

  letter-spacing:-0.3px;

  padding-bottom:10px;

  border-bottom:1px solid var(--border);

}

.month-header:first-child{margin-top:0}

.hcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color 0.15s}

.hcard:hover{border-color:var(--border2)}

.hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}

.hdl{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.2px}

.hdm{font-size:11px;color:var(--text3)}

.tdy{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(232,213,176,0.1);color:var(--accent);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

.hem{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:10px 0 5px}

.hbul{font-size:13px;color:var(--text2);line-height:1.6;padding:2px 0;display:flex;gap:8px}

.hbul::before{content:"—";color:var(--text3);flex-shrink:0}

.hli{font-size:13px;color:var(--text2);line-height:1.6;padding:3px 0;display:flex;gap:7px;align-items:flex-start}

.hlt{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;flex-shrink:0;margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}

.tree-year{margin-bottom:8px}

.tree-year-btn{width:100%;text-align:left;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-family:var(--serif);font-size:20px;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center;letter-spacing:-0.3px;transition:all 0.15s}

.tree-year-btn:hover,.tree-year-btn.open{border-color:var(--border2)}

.tree-year-btn.open{border-radius:10px 10px 0 0;border-bottom-color:transparent}

.tree-months{border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:8px}

function buildExport(days,fromDate,toDate){

  return sbGetAll().then(function(rows){

    var dataMap={};rows.forEach(function(r){dataMap[r.id]=r.data;});

    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dataMap[k])dataMap[k]=CACHE[k];});

    var tod=today();

    var keys=Object.keys(dataMap).filter(function(k){

      if(!k.startsWith('j-'))return false;

      var ds=k.replace('j-','');

      if(fromDate&&toDate)return ds>=fromDate&&ds<=toDate;

      if(days===1)return ds===tod;

      if(days>1){var cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);return new Date(ds+'T12:00:00')>=cutoff;}

      return true;

    }).sort();

    if(!keys.length)return null;

    var out='JOURNAL ENTRIES\n===============\n\n';

    keys.forEach(function(k){

      var v=dataMap[k];if(!v)return;

      var ds=k.replace('j-','');

      var lbl=new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

      var has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c&&(v.c.c1||v.c.c2||v.c.c3));

      if(!has)return;

      out+='DATE: '+lbl+'\n';

      var ml=Object.values(v.m||{}).filter(Boolean);

      if(ml.length)out+='Morning: '+ml.join(' | ')+'\n';

      if(v.log&&v.log.length){out+='Log:\n';v.log.forEach(function(x){out+='  ['+x.tag+'] '+x.time+' -- '+x.text+(x.reply?' -> '+x.reply:'')+'\n';});}

      var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);

      if(cl.length)out+='Close: '+cl.join(' | ')+'\n';

      if(v.c&&v.c.star)out+='Awareness: '+v.c.star+'/5\n';

      if(v.c&&v.c.yn)out+='Aligned: '+({y:'Yes',p:'Partially',n:'Not really'}[v.c.yn]||'')+'\n';

      out+='\n';

    });

    return out;

  });

}

    var prompt=data+'\n===============\n'+extraPrompt;

  });

}

function renderSavedReviews(filterType){
  var list=document.getElementById('rev-type-content');if(!list)return;
  filterType=filterType||'daily';
  var revs=getRevs();
  var typeLabel={today:'Daily',month:'Monthly',alltime:'All Time',specific:'Daily'};
  var typeClass={today:'today',month:'month',alltime:'alltime',specific:'today'};
  var filtered;
  if(filterType==='daily'){
    filtered=revs.filter(function(r){return r.type==='today'||r.type==='specific'||!r.type;});
  } else if(filterType==='monthly'){
    filtered=revs.filter(function(r){return r.type==='month';});
  } else {
    filtered=revs.filter(function(r){return r.type==='alltime';});
  }
  if(!filtered.length){
    list.innerHTML='<div class="empty-rev">No '+filterType+' reviews saved yet.</div>';
    return;
  }
  list.innerHTML='';
  if(filterType==='daily'){
    var grouped={};
    filtered.forEach(function(rev){
      var d=new Date((rev.dateRaw||today())+'T12:00:00');
      var mk=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
      if(!grouped[mk])grouped[mk]=[];
      grouped[mk].push(rev);
    });
    var mkeys=Object.keys(grouped).sort(function(a,b){
      return new Date('01 '+b)-new Date('01 '+a);
    });
    mkeys.forEach(function(mk){
      var mId='rme-'+mk.split(' ').join('-');
      var mDiv=document.createElement('div');
      mDiv.className='rev-month-header';
      var mBtn=document.createElement('button');
      mBtn.className='rev-month-btn';
      mBtn.innerHTML='<span class="rev-month-label">'+mk+'</span><span class="rev-month-count">'+grouped[mk].length+' review'+(grouped[mk].length>1?'s':'')+'</span><span class="rev-month-arrow">&#9660;</span>';
      var mEntries=document.createElement('div');
      mEntries.className='rev-month-entries';
      mEntries.id=mId;
      mEntries.style.display='none';
      mBtn.addEventListener('click',function(){
        var open=mEntries.style.display==='none';
        mEntries.style.display=open?'':'none';
        mBtn.querySelector('.rev-month-arrow').innerHTML=open?'&#9650;':'&#9660;';
      });
      grouped[mk].forEach(function(rev){renderRevCard(rev,mEntries,typeLabel,typeClass);});
      mDiv.appendChild(mBtn);
      mDiv.appendChild(mEntries);
      list.appendChild(mDiv);
    });
  } else {
    filtered.forEach(function(rev){renderRevCard(rev,list,typeLabel,typeClass);});
  }
}

  document.getElementById('kw-search').addEventListener('input',function(){renderHistory();});
  renderHistory();
}

function switchHistTab(tab){
  document.getElementById('ht-browse').classList.toggle('on',tab==='browse');
  document.getElementById('ht-tree').classList.toggle('on',tab==='tree');
  document.getElementById('browse-pane').style.display=tab==='browse'?'':'none';
  document.getElementById('tree-pane').style.display=tab==='tree'?'':'none';
  if(tab==='tree')renderTree();
}

function renderHistory(){
  var list=document.getElementById('hist-list');if(!list)return;
  var tod=today();
  var kwEl=document.getElementById('kw-search');
  var kw=kwEl?kwEl.value.trim().toLowerCase():'';
  list.innerHTML='<div class="thinking">Loading...</div>';
  sbGetAll().then(function(rows){
    var dataMap={};rows.forEach(function(r){dataMap[r.id]=r.data;});
    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dataMap[k])dataMap[k]=CACHE[k];});
    var allKeys=Object.keys(dataMap).filter(function(k){return k.startsWith('j-');}).sort().reverse();
    if(!allKeys.length){list.innerHTML='<div class="empty">No entries yet</div>';return;}
    list.innerHTML='';
    var lastMonth='';var any=false;
    allKeys.slice(0,120).forEach(function(k){
      try{
        var v=dataMap[k];if(!v)return;
        var ds=k.replace('j-','');var isT=ds===tod;
        var dateObj=new Date(ds+'T12:00:00');
        var lbl=dateObj.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
        var logEntries=v.log||[];
        if(activeFilter!=='all')logEntries=logEntries.filter(function(x){return x.tag===activeFilter;});
        var matchesSearch=true;
        if(kw){
          var mlMatch=Object.values(v.m||{}).some(function(x){return x&&x.toLowerCase().indexOf(kw)>=0;});
          var clMatch=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].some(function(x){return x&&x.toLowerCase().indexOf(kw)>=0;});
          var logMatch=logEntries.some(function(x){return(x.text+' '+(x.reply||'')).toLowerCase().indexOf(kw)>=0;});
          if(!mlMatch&&!clMatch&&!logMatch){matchesSearch=false;}
          logEntries=logEntries.filter(function(x){return(x.text+' '+(x.reply||'')).toLowerCase().indexOf(kw)>=0;});
        }
        if(!matchesSearch)return;
        var has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c&&(v.c.c1||v.c.c2||v.c.c3));
        if(!has)return;
        var monthKey2=dateObj.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
        if(monthKey2!==lastMonth){
          var mh=document.createElement('div');mh.className='month-header';mh.textContent=monthKey2;
          list.appendChild(mh);lastMonth=monthKey2;
        }
        // Collapsed day card
        var meta=[];if(v.c&&v.c.star)meta.push('Awareness '+v.c.star+'/5');if(v.c&&v.c.yn)meta.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
        // Gist: first log entry text or morning first field
        var gist='';
        if(v.log&&v.log.length)gist=v.log[0].text.slice(0,60)+(v.log[0].text.length>60?'...':'');
        else{var mvals=Object.values(v.m||{}).filter(Boolean);if(mvals.length)gist=mvals[0].slice(0,60);}
        var dayCard=document.createElement('div');dayCard.className='hcard';
        var dayHeader=document.createElement('div');dayHeader.className='hist-day-header';
        dayHeader.innerHTML='<div class="hist-day-top"><span class="hdl">'+lbl+'</span>'+(isT?'<span class="tdy">Today</span>':'')+' '+(meta.length?'<span class="hdm">'+meta.join(' · ')+'</span>':'')+'</div>'+(gist&&!kw?'<div class="hist-day-gist">'+gist+'</div>':'')+'<span class="hist-day-arrow">&#9660;</span>';
        var dayBody=document.createElement('div');dayBody.className='hist-day-body';dayBody.style.display=kw?'':'none';
        // Build body content
        function hl(txt){if(!kw||!txt)return txt||'';return txt.replace(new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark class="search-highlight">$1</mark>');}
        var inner='';
        if(activeFilter==='all'&&!kw){var ml=Object.values(v.m||{}).filter(Boolean);if(ml.length){inner+='<div class="hem">Morning</div>';ml.forEach(function(x){inner+='<div class="hbul">'+hl(x)+'</div>';});}}
        if(activeFilter==='all'&&kw){var ml2=Object.values(v.m||{}).filter(function(x){return x&&x.toLowerCase().indexOf(kw)>=0;});if(ml2.length){inner+='<div class="hem">Morning</div>';ml2.forEach(function(x){inner+='<div class="hbul">'+hl(x)+'</div>';});}}
        if(logEntries.length||(!kw&&v.log&&v.log.length)){
          var logsToShow=kw?logEntries:(v.log||[]);
          if(logsToShow.length){inner+='<div class="hem">Log ('+logsToShow.length+')</div>';logsToShow.forEach(function(x){inner+='<div class="hli"><span class="hlt '+(TC[x.tag]||'ti')+'">'+(TL[x.tag]||x.tag)+'</span><span style="margin-left:5px">'+hl(x.text)+(x.reply?'<br><span style="font-size:12px;color:var(--text3)">-> '+hl(x.reply)+'</span>':'')+'</span></div>';});}
        }
        if(activeFilter==='all'){var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);if(cl.length){inner+='<div class="hem">Close</div>';cl.forEach(function(x){inner+='<div class="hbul">'+hl(x)+'</div>';});}}
        dayBody.innerHTML=inner||'<div class="empty" style="padding:10px 0">No content</div>';
        dayHeader.style.cursor='pointer';
        dayHeader.addEventListener('click',function(){
          var open=dayBody.style.display==='none';
          dayBody.style.display=open?'':'none';
          dayHeader.querySelector('.hist-day-arrow').innerHTML=open?'&#9650;':'&#9660;';
        });
        dayCard.appendChild(dayHeader);dayCard.appendChild(dayBody);
        list.appendChild(dayCard);any=true;
      }catch(e){}
    });
    if(!any)list.innerHTML='<div class="empty">No entries found</div>';
    renderTree(dataMap);
  });
}

function renderTree(dataMap){
  var tree=document.getElementById('date-tree');if(!tree)return;
  if(!dataMap){sbGetAll().then(function(rows){var dm={};rows.forEach(function(r){dm[r.id]=r.data;});Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){if(!dm[k])dm[k]=CACHE[k];});renderTree(dm);});return;}
  var tod=today();var keys=Object.keys(dataMap).filter(function(k){return k.startsWith('j-');}).sort().reverse();
  if(!keys.length){tree.innerHTML='<div class="empty">No entries yet</div>';return;}
  var grouped={};
  keys.forEach(function(k){
    var v=dataMap[k];if(!v)return;var ds=k.replace('j-','');
    var has=(v.log&&v.log.length)||(Object.values(v.m||{}).some(Boolean))||(v.c&&(v.c.c1||v.c.c2||v.c.c3));
    if(!has)return;
    var d=new Date(ds+'T12:00:00');var yr=d.getFullYear();var mo=d.toLocaleDateString('en-GB',{month:'long'});
    if(!grouped[yr])grouped[yr]={};if(!grouped[yr][mo])grouped[yr][mo]=[];
    grouped[yr][mo].push({key:k,ds:ds,d:d,v:v});
  });
  tree.innerHTML='';
  Object.keys(grouped).sort().reverse().forEach(function(yr){
    var ydiv=document.createElement('div');ydiv.className='tree-year';
    var yid='yr-'+yr;
    var yBtn=document.createElement('button');yBtn.className='tree-year-btn';yBtn.id=yid+'-btn';
    yBtn.innerHTML=yr+' <span id="'+yid+'-arr">&#9660;</span>';
    var yContent=document.createElement('div');yContent.id=yid;yContent.className='tree-months';yContent.style.display='none';
    yBtn.addEventListener('click',function(){toggleTree(yid);});
    ydiv.appendChild(yBtn);ydiv.appendChild(yContent);tree.appendChild(ydiv);
    Object.keys(grouped[yr]).forEach(function(mo){
      var mid='mo-'+yr+'-'+mo.split(' ').join('');
      var entries=grouped[yr][mo];
      var mbtn=document.createElement('button');mbtn.className='tree-month-btn';
      mbtn.innerHTML=mo+' <span style="font-size:11px;color:var(--text3)">'+entries.length+' day'+(entries.length>1?'s':'')+'</span>';
      mbtn.addEventListener('click',function(){toggleTree(mid,mbtn);});
      var mdiv=document.createElement('div');mdiv.id=mid;mdiv.className='tree-days';mdiv.style.display='none';
      entries.forEach(function(entry){
        var key=entry.key;var ds=entry.ds;var d=entry.d;var v=entry.v;
        var isT=ds===tod;
        var dayLbl=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        var logCount=v.log?v.log.length:0;
        var dbtn=document.createElement('button');dbtn.className='tree-day-btn'+(isT?' today-day':'');
        dbtn.innerHTML='<span>'+dayLbl+(isT?' - Today':'')+'</span><span style="font-size:11px;color:var(--text3)">'+logCount+' log'+(logCount!==1?'s':'')+'</span>';
        var did='day-'+key;
        dbtn.addEventListener('click',function(){
          var existing=document.getElementById(did);if(existing){existing.remove();return;}
          var dd=document.createElement('div');dd.id=did;dd.className='day-detail';
          var inner='';
          var ml=Object.values(v.m||{}).filter(Boolean);if(ml.length){inner+='<div class="hem">Morning</div>';ml.forEach(function(x){inner+='<div class="hbul">'+x+'</div>';});}
          if(v.log&&v.log.length){inner+='<div class="hem">Log</div>';v.log.forEach(function(x){inner+='<div class="hli"><span class="hlt '+(TC[x.tag]||'ti')+'">'+(TL[x.tag]||x.tag)+'</span><span style="margin-left:5px">'+x.text+(x.reply?'<br><span style="font-size:12px;color:var(--text3)">-> '+x.reply+'</span>':'')+'</span></div>';});}
          var cl=[v.c&&v.c.c1,v.c&&v.c.c2,v.c&&v.c.c3].filter(Boolean);if(cl.length){inner+='<div class="hem">Close</div>';cl.forEach(function(x){inner+='<div class="hbul">'+x+'</div>';});}
          var meta2=[];if(v.c&&v.c.star)meta2.push('Awareness '+v.c.star+'/5');if(v.c&&v.c.yn)meta2.push({y:'Aligned',p:'Partial',n:'Not really'}[v.c.yn]||'');
          if(meta2.length)inner+='<div style="font-size:12px;color:var(--text3);margin-top:6px">'+meta2.join(' - ')+'</div>';
          if(!inner)inner='<div class="empty" style="padding:10px 0">No content</div>';
          dd.innerHTML=inner;dbtn.parentNode.insertBefore(dd,dbtn.nextSibling);
        });
        mdiv.appendChild(dbtn);
      });
      yContent.appendChild(mbtn);yContent.appendChild(mdiv);
    });
  });
}

function toggleTree(id,btn){
  var el=document.getElementById(id);if(!el)return;
  var open=el.style.display==='none';el.style.display=open?'':'none';
  if(btn)btn.classList.toggle('open',open);
  var arr=document.getElementById(id+'-arr');if(arr)arr.innerHTML=open?'&#9650;':'&#9660;';
}


function doStreak(){

  sbGetAll().then(function(rows){

    var ks={};rows.filter(function(r){return r.id.startsWith('j-');}).forEach(function(r){ks[r.id.replace('j-','')]=1;});

    Object.keys(CACHE).filter(function(k){return k.startsWith('j-');}).forEach(function(k){ks[k.replace('j-','')]=1;});

    var n=0;var d=new Date();

    for(var i=0;i<60;i++){

      var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());

      if(ks[ds]){n++;d.setDate(d.getDate()-1);}else if(i===0)d.setDate(d.getDate()-1);else break;

    }

    var el=document.getElementById('slbl');if(el)el.textContent=n>1?n+' day streak':'';

  });

}

function restoreFromBackup(){

  return sbGetAll().then(function(rows){

    var existingIds={};rows.forEach(function(r){existingIds[r.id]=1;});

    var promises=[];

    for(var i=0;i<localStorage.length;i++){

      var k=localStorage.key(i);

      if(k&&k.startsWith('backup_')){

        var id=k.replace('backup_','');

        if(!existingIds[id]){

          try{var d=JSON.parse(localStorage.getItem(k));promises.push(sbSet(id,d));}catch(e){}

        }

      }

    }

    return Promise.all(promises);

  });

}


// ── PIN LOCK ──
var PIN_KEY = 'journal_pin';
var pinBuffer = '';
var lockMode = 'unlock';
var pinFirst = '';

function hashPin(pin) {
  var h = 0;
  for (var i = 0; i < pin.length; i++) {
    h = (Math.imul(31, h) + pin.charCodeAt(i)) | 0;
  }
  return String(h);
}

function showLock(mode) {
  lockMode = mode || 'unlock';
  pinBuffer = '';
  pinFirst = '';
  var ls = document.getElementById('lockscreen');
  var sub = document.getElementById('lock-sub');
  var change = document.getElementById('lock-change');
  var stored = localStorage.getItem(PIN_KEY);
  if (ls) ls.style.display = 'flex';
  if (sub) {
    if (lockMode === 'set1') sub.textContent = 'Set a new 6-digit PIN';
    else if (lockMode === 'set2') sub.textContent = 'Confirm your PIN';
    else sub.textContent = 'Enter your PIN';
  }
  if (change) change.style.display = stored ? 'block' : 'none';
  updateDots();
}

function hideLock() {
  var ls = document.getElementById('lockscreen');
  if (ls) ls.style.display = 'none';
}

function updateDots() {
  for (var i = 0; i < 6; i++) {
    var dot = document.getElementById('dot-' + i);
    if (dot) {
      dot.classList.toggle('filled', i < pinBuffer.length);
      dot.classList.remove('error');
    }
  }
}

function pinError(msg) {
  var err = document.getElementById('lock-err');
  if (err) { err.textContent = msg || 'Incorrect PIN'; err.classList.add('show'); }
  for (var i = 0; i < 6; i++) {
    var dot = document.getElementById('dot-' + i);
    if (dot) dot.classList.add('error');
  }
  setTimeout(function() {
    pinBuffer = '';
    updateDots();
    if (err) err.classList.remove('show');
  }, 900);
}

function pinPress(n) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += n;
  updateDots();
  if (pinBuffer.length === 6) {
    setTimeout(function() { pinSubmit(); }, 120);
  }
}

function pinDel() {
  if (!pinBuffer.length) return;
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
}

function pinSubmit() {
  var stored = localStorage.getItem(PIN_KEY);
  if (lockMode === 'unlock') {
    if (hashPin(pinBuffer) === stored) {
      hideLock();
    } else {
      pinError('Incorrect PIN');
    }
  } else if (lockMode === 'set1') {
    pinFirst = pinBuffer;
    pinBuffer = '';
    updateDots();
    var sub = document.getElementById('lock-sub');
    if (sub) sub.textContent = 'Confirm your PIN';
    lockMode = 'set2';
  } else if (lockMode === 'set2') {
    if (pinBuffer === pinFirst) {
      localStorage.setItem(PIN_KEY, hashPin(pinBuffer));
      hideLock();
    } else {
      pinError("PINs don't match");
      lockMode = 'set1';
      pinFirst = '';
      setTimeout(function() {
        var sub = document.getElementById('lock-sub');
        if (sub) sub.textContent = 'Set a new 6-digit PIN';
      }, 950);
    }
  }
}

function initLock() {
  document.querySelectorAll('.numkey[data-n]').forEach(function(btn) {
    btn.addEventListener('click', function(e) { e.preventDefault(); pinPress(btn.dataset.n); });
  });
  var del = document.getElementById('pin-del');
  if (del) del.addEventListener('click', function(e) { e.preventDefault(); pinDel(); });

  var change = document.getElementById('lock-change');
  if (change) change.addEventListener('click', function() { showLock('set1'); });

  document.addEventListener('keydown', function(e) {
    var ls = document.getElementById('lockscreen');
    if (!ls || ls.style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9') { pinPress(e.key); }
    else if (e.key === 'Backspace') { e.preventDefault(); pinDel(); }
  });

  var stored = localStorage.getItem(PIN_KEY);
  if (stored) { showLock('unlock'); }
  else { showLock('set1'); }
}

function lockJournal() {
  var stored = localStorage.getItem(PIN_KEY);
  if (stored) { showLock('unlock'); }
  else { showLock('set1'); }
}
